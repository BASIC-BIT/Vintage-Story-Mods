name: Build Vintage Story Mods

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  VS_VERSION: "1.22.2"
  DOTNET_VERSION: "10.0.x"

jobs:
  validate-architecture:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Validate Structurizr DSL
      run: |
        docker run --rm \
          -v "${{ github.workspace }}/docs/architecture:/usr/local/structurizr" \
          structurizr/cli validate \
          -workspace /usr/local/structurizr/dimensionlib-api-surface.dsl

    - name: Validate Structurizr Local workspace load
      run: |
        set -euo pipefail

        mkdir -p "$RUNNER_TEMP/structurizr-data"
        chmod 777 "$RUNNER_TEMP/structurizr-data"
        docker run -d --name structurizr-validation \
          -p 8080:8080 \
          -v "$RUNNER_TEMP/structurizr-data:/usr/local/structurizr" \
          -v "${{ github.workspace }}/docs/architecture/dimensionlib-api-surface.dsl:/usr/local/structurizr/workspace.dsl:ro" \
          structurizr/structurizr local

        cleanup() {
          docker rm -f structurizr-validation >/dev/null 2>&1 || true
        }
        trap cleanup EXIT

        loaded=false
        for attempt in {1..60}; do
          if curl -fsS http://localhost:8080/api/workspace/1 -o workspace-response.json; then
            loaded=true
            break
          fi
          echo "Waiting for Structurizr Local API ($attempt/60)..."
          sleep 2
        done

        if [ "$loaded" != "true" ]; then
          docker logs structurizr-validation || true
          echo "Structurizr Local did not respond with a workspace payload." >&2
          exit 1
        fi

        python3 - <<'PY' || { docker logs structurizr-validation || true; exit 1; }
        import json
        import sys

        with open("workspace-response.json", "r", encoding="utf-8") as response_file:
            data = json.load(response_file)

        if data.get("success") is False:
            print(data.get("message", "Structurizr workspace API returned success=false"), file=sys.stderr)
            sys.exit(1)

        has_wrapped_workspace = "workspace" in data
        has_direct_workspace = "model" in data and "views" in data
        if not has_wrapped_workspace and not has_direct_workspace:
            print("Structurizr workspace API did not return a recognizable workspace payload.", file=sys.stderr)
            sys.exit(1)
        PY

  build:
    needs: validate-architecture
    if: ${{ always() }}
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write

    steps:
    - name: Require architecture validation
      run: |
        if ("${{ needs.validate-architecture.result }}" -ne "success") {
          Write-Host "Structurizr architecture validation failed or did not complete." -ForegroundColor Red
          exit 1
        }
      shell: pwsh

    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Python (for Lizard complexity analysis)
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Cache VS Dependencies
      id: cache-vs-deps
      uses: actions/cache@v4
      with:
        path: |
          vs-dependencies
          vs-installation
        key: vs-deps-${{ env.VS_VERSION }}
        
    - name: Download VS Dependencies
      if: steps.cache-vs-deps.outputs.cache-hit != 'true'
      run: |
        Write-Host "Downloading VS ${{ env.VS_VERSION }} dependencies..." -ForegroundColor Yellow
        
        # Clone the dependencies repository using Personal Access Token
        $repoUrl = "https://${{ secrets.VS_DEPS_TOKEN }}@github.com/BASIC-BIT/vs-build-dependencies.git"
        git clone $repoUrl vs-dependencies-repo
        
        # Check if the version exists
        if (-not (Test-Path "vs-dependencies-repo\${{ env.VS_VERSION }}")) {
          Write-Host "Error: Version ${{ env.VS_VERSION }} not found in dependencies repository" -ForegroundColor Red
          Write-Host "Available versions:" -ForegroundColor Yellow
          if (Test-Path "vs-dependencies-repo") {
            Get-ChildItem "vs-dependencies-repo" -Directory | ForEach-Object { Write-Host "  - $($_.Name)" }
          } else {
            Write-Host "  (Repository clone failed - no versions available)"
          }
          Write-Host "" -ForegroundColor Yellow
          Write-Host "To fix this issue:" -ForegroundColor Yellow
          Write-Host "1. Make sure the vs-build-dependencies repository exists and is accessible" -ForegroundColor Yellow
          Write-Host "2. Run the upload script to upload VS ${{ env.VS_VERSION }} dependencies:" -ForegroundColor Yellow
          Write-Host "   .\scripts\upload-vs-dependencies.ps1" -ForegroundColor Yellow
          exit 1
        }
        
        # Create directory structure that matches legacy VS installation expectations
        New-Item -ItemType Directory -Path "vs-installation" -Force | Out-Null
        New-Item -ItemType Directory -Path "vs-installation\Mods" -Force | Out-Null
        New-Item -ItemType Directory -Path "vs-installation\Lib" -Force | Out-Null
        
        # Copy DLLs to match legacy project expectations
        # Core DLLs go to root
        Copy-Item "vs-dependencies-repo\${{ env.VS_VERSION }}\core\*" "vs-installation\" -Force
        
        # Mod DLLs go to Mods subfolder
        Copy-Item "vs-dependencies-repo\${{ env.VS_VERSION }}\mods\*" "vs-installation\Mods\" -Force
        
        # Library DLLs go to Lib subfolder
        Copy-Item "vs-dependencies-repo\${{ env.VS_VERSION }}\lib\*" "vs-installation\Lib\" -Force
        
        # Also create the modern structure for newer projects
        New-Item -ItemType Directory -Path "vs-dependencies" -Force | Out-Null
        New-Item -ItemType Directory -Path "vs-dependencies\core" -Force | Out-Null
        New-Item -ItemType Directory -Path "vs-dependencies\mods" -Force | Out-Null
        New-Item -ItemType Directory -Path "vs-dependencies\lib" -Force | Out-Null
        
        Copy-Item "vs-dependencies-repo\${{ env.VS_VERSION }}\core\*" "vs-dependencies\core\" -Force
        Copy-Item "vs-dependencies-repo\${{ env.VS_VERSION }}\mods\*" "vs-dependencies\mods\" -Force
        Copy-Item "vs-dependencies-repo\${{ env.VS_VERSION }}\lib\*" "vs-dependencies\lib\" -Force
        
        # Clean up the cloned repo
        Remove-Item -Path "vs-dependencies-repo" -Recurse -Force
        
        Write-Host "VS dependencies downloaded successfully" -ForegroundColor Green
      shell: pwsh
      
    - name: Verify Dependencies
      run: |
        Write-Host "Verifying VS dependencies..." -ForegroundColor Yellow
        
        $cacheHit = "${{ steps.cache-vs-deps.outputs.cache-hit }}" -eq "true"
        if ($cacheHit) {
          Write-Host "Cache hit detected - dependencies restored from cache" -ForegroundColor Green
        } else {
          Write-Host "Cache miss - dependencies were downloaded fresh" -ForegroundColor Yellow
        }
        
        # Check legacy structure (required for build)
        $legacyDlls = @(
          "vs-installation\VintagestoryAPI.dll",
          "vs-installation\VintagestoryLib.dll",
          "vs-installation\Mods\VSSurvivalMod.dll",
          "vs-installation\Mods\VSEssentials.dll",
          "vs-installation\Mods\VSCreativeMod.dll",
          "vs-installation\Lib\cairo-sharp.dll",
          "vs-installation\Lib\protobuf-net.dll",
          "vs-installation\Lib\0Harmony.dll"
        )
        
        # Check modern structure (optional, for future use)
        $modernDlls = @(
          "vs-dependencies\core\VintagestoryAPI.dll",
          "vs-dependencies\core\VintagestoryLib.dll",
          "vs-dependencies\mods\VSSurvivalMod.dll",
          "vs-dependencies\mods\VSEssentials.dll",
          "vs-dependencies\mods\VSCreativeMod.dll",
          "vs-dependencies\lib\cairo-sharp.dll",
          "vs-dependencies\lib\protobuf-net.dll",
          "vs-dependencies\lib\0Harmony.dll"
        )
        
        $missingLegacyDlls = @()
        $missingModernDlls = @()
        
        foreach ($dll in $legacyDlls) {
          if (Test-Path $dll) {
            Write-Host "Found (legacy): $dll" -ForegroundColor Green
          } else {
            $missingLegacyDlls += $dll
            Write-Host "Missing (legacy): $dll" -ForegroundColor Red
          }
        }
        
        foreach ($dll in $modernDlls) {
          if (Test-Path $dll) {
            Write-Host "Found (modern): $dll" -ForegroundColor Gray
          } else {
            $missingModernDlls += $dll
          }
        }
        
        if ($missingLegacyDlls.Count -gt 0) {
          Write-Host "Error: Missing required legacy DLLs for build:" -ForegroundColor Red
          $missingLegacyDlls | ForEach-Object { Write-Host "  - $_" -ForegroundColor Red }
          Write-Host "Cache status: $(if ($cacheHit) { 'HIT' } else { 'MISS' })" -ForegroundColor Yellow
          exit 1
        }
        
        Write-Host "All required dependencies verified!" -ForegroundColor Green
        Write-Host "Legacy DLLs: $($legacyDlls.Count - $missingLegacyDlls.Count)/$($legacyDlls.Count)" -ForegroundColor Green
        Write-Host "Modern DLLs: $($modernDlls.Count - $missingModernDlls.Count)/$($modernDlls.Count)" -ForegroundColor Gray
      shell: pwsh
      
    - name: Set VINTAGE_STORY Environment Variable
      run: |
        # Set VINTAGE_STORY to point to our legacy-compatible directory structure
        $vsPath = "$(pwd)\vs-installation"
        echo "VINTAGE_STORY=$vsPath" >> $env:GITHUB_ENV
        Write-Host "Set VINTAGE_STORY=$vsPath" -ForegroundColor Green
        
        # Also set modern path for any scripts that might need it
        $modernPath = "$(pwd)\vs-dependencies"
        echo "VS_DEPENDENCIES=$modernPath" >> $env:GITHUB_ENV
        Write-Host "Set VS_DEPENDENCIES=$modernPath" -ForegroundColor Green
      shell: pwsh
      
    - name: Restore Dependencies
      run: |
        $projects = @(
          "mods-dll/thebasics.Tests/thebasics.Tests.csproj",
          "mods-dll/dimensionlib.Tests/dimensionlib.Tests.csproj",
          "mods-dll/dimensionlib/dimensionlib.csproj",
          "mods-dll/dimensionpockets/dimensionpockets.csproj",
          "mods-dll/dimensioncavern/dimensioncavern.csproj"
        )

        foreach ($project in $projects) {
          dotnet restore $project
          if (-not $?) {
            exit 1
          }
        }
      shell: pwsh

    - name: Build Code Mods
      run: |
        Write-Host "Building code mods and tests..." -ForegroundColor Yellow

        $projects = @(
          "mods-dll/thebasics.Tests/thebasics.Tests.csproj",
          "mods-dll/dimensionlib.Tests/dimensionlib.Tests.csproj",
          "mods-dll/dimensionlib/dimensionlib.csproj",
          "mods-dll/dimensionpockets/dimensionpockets.csproj",
          "mods-dll/dimensioncavern/dimensioncavern.csproj"
        )

        foreach ($project in $projects) {
          dotnet build $project --configuration Release --no-restore --verbosity normal
          if (-not $?) {
            exit 1
          }
        }
      shell: pwsh

    - name: Check Formatting
      run: |
        $projects = @(
          "mods-dll/thebasics.Tests/thebasics.Tests.csproj",
          "mods-dll/dimensionlib.Tests/dimensionlib.Tests.csproj",
          "mods-dll/dimensionlib/dimensionlib.csproj",
          "mods-dll/dimensionpockets/dimensionpockets.csproj",
          "mods-dll/dimensioncavern/dimensioncavern.csproj"
        )

        foreach ($project in $projects) {
          dotnet format whitespace $project --verify-no-changes
          if (-not $?) {
            exit 1
          }
        }
      shell: pwsh
      continue-on-error: false

    - name: Run The BASICs Tests with Coverage
      run: |
        dotnet test mods-dll/thebasics.Tests/thebasics.Tests.csproj `
          --configuration Release `
          --no-build `
          --verbosity normal `
          --settings mods-dll/thebasics.Tests/coverlet.runsettings `
          --collect:"XPlat Code Coverage" `
          --results-directory TestResults
      shell: pwsh

    - name: Run DimensionLib Tests
      run: |
        dotnet test mods-dll/dimensionlib.Tests/dimensionlib.Tests.csproj `
          --configuration Release `
          --no-build `
          --verbosity normal `
          --collect:"XPlat Code Coverage" `
          --results-directory TestResults
      shell: pwsh

    - name: Generate Coverage Report
      if: always()
      uses: danielpalme/ReportGenerator-GitHub-Action@5.4.4
      with:
        reports: '**/TestResults/**/coverage.cobertura.xml'
        targetdir: coveragereport
        reporttypes: 'HtmlInline;Cobertura'

    - name: Download Base Coverage
      if: always()
      run: |
        New-Item -ItemType Directory -Force -Path base-coverage | Out-Null

        $runs = gh run list --workflow build.yml --branch main --json databaseId,conclusion --limit 20 | ConvertFrom-Json
        $run = $runs | Where-Object { $_.conclusion -eq 'success' } | Select-Object -First 1

        if (-not $run) {
          Write-Host "No successful main build found for coverage baseline" -ForegroundColor Yellow
          exit 0
        }

        gh run download $run.databaseId --name coverage-baseline --dir base-coverage 2>$null
        if ($LASTEXITCODE -ne 0) {
          Write-Host "Coverage baseline artifact missing in main run $($run.databaseId)" -ForegroundColor Yellow
          exit 0
        }

        if (-not (Test-Path "base-coverage/coverage.json")) {
          Write-Host "Coverage baseline artifact missing in main run $($run.databaseId)" -ForegroundColor Yellow
        }
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Coverage Threshold Check
      if: always()
      run: |
        $failThreshold = 3
        $warnThreshold = 5

        # Assumes single test project. If adding more, merge cobertura
        # files first (ReportGenerator can do this).
        $coberturaFile = Get-ChildItem -Path TestResults -Filter coverage.cobertura.xml -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $coberturaFile) {
          Write-Host "::warning::No coverage.cobertura.xml found — skipping threshold check (tests may have failed)"
          exit 0
        }

        [xml]$xml = Get-Content $coberturaFile.FullName
        $lineRate   = [math]::Round([double]$xml.coverage.'line-rate' * 100, 1)
        $branchRate = [math]::Round([double]$xml.coverage.'branch-rate' * 100, 1)
        $covered    = $xml.coverage.'lines-covered'
        $total      = $xml.coverage.'lines-valid'
        $brCovered  = $xml.coverage.'branches-covered'
        $brTotal    = $xml.coverage.'branches-valid'

        # Compare with base branch if available
        $baseLine = "—"
        $baseBranch = "—"
        $lineDelta = ""
        $branchDelta = ""
        $baseFile = "base-coverage/coverage.json"
        if (Test-Path $baseFile) {
          $base = Get-Content $baseFile | ConvertFrom-Json
          $baseLine = "$($base.lineRate)%"
          $baseBranch = "$($base.branchRate)%"
          $ld = [math]::Round($lineRate - $base.lineRate, 1)
          $bd = [math]::Round($branchRate - $base.branchRate, 1)
          $lineDelta = if ($ld -gt 0) { " (+$ld)" } elseif ($ld -lt 0) { " ($ld)" } else { " (=)" }
          $branchDelta = if ($bd -gt 0) { " (+$bd)" } elseif ($bd -lt 0) { " ($bd)" } else { " (=)" }
        }

        # Save current coverage for future comparisons
        @{ lineRate = $lineRate; branchRate = $branchRate } | ConvertTo-Json | Set-Content "coverage.json"

        # Job summary
        $summary = @(
          "## Code Coverage"
          "| Metric | This PR | Base | Threshold |"
          "|--------|---------|------|-----------|"
          "| Lines | **$lineRate%**$lineDelta | $baseLine | $failThreshold% fail / $warnThreshold% warn |"
          "| Branches | **$branchRate%**$branchDelta | $baseBranch | — |"
        ) -join "`n"
        $summary >> $env:GITHUB_STEP_SUMMARY

        # Also write a PR comment file
        $comment = @(
          "<!-- coverage-report -->"
          "## Code Coverage"
          "| Metric | This PR | Base | Delta |"
          "|--------|---------|------|-------|"
          "| Lines | **$lineRate%** ($covered/$total) | $baseLine | $lineDelta |"
          "| Branches | **$branchRate%** ($brCovered/$brTotal) | $baseBranch | $branchDelta |"
          ""
          "_Thresholds: $failThreshold% fail / $warnThreshold% warn_"
        ) -join "`n"
        Set-Content -Path "coverage-comment.md" -Value $comment

        if ($lineRate -lt $failThreshold) {
          Write-Host "::error::Line coverage $lineRate% is below fail threshold ($failThreshold%)"
          exit 1
        } elseif ($lineRate -lt $warnThreshold) {
          Write-Host "::warning::Line coverage $lineRate% is below warn threshold ($warnThreshold%)"
        } else {
          Write-Host "Coverage: $lineRate% lines, $branchRate% branches"
        }
      shell: pwsh

    - name: Save Coverage Baseline
      if: github.ref == 'refs/heads/main' && success()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-baseline
        path: coverage.json
        retention-days: 90

    - name: Comment PR with Coverage
      if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && always()
      run: |
        if (Test-Path "coverage-comment.md") {
          $commentBody = Get-Content "coverage-comment.md" -Raw
          $existingCommentId = gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --paginate --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- coverage-report -->"))) | .id' | Select-Object -First 1

          if ($existingCommentId) {
            gh api --method PATCH repos/${{ github.repository }}/issues/comments/$existingCommentId --raw-field body="$commentBody" | Out-Null
          } else {
            gh pr comment ${{ github.event.pull_request.number }} --body-file coverage-comment.md
          }
        } else {
          Write-Host "Coverage comment file not found — skipping PR comment" -ForegroundColor Yellow
        }
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Coverage Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: CoverageReport
        path: coveragereport
        retention-days: 30

    - name: Code Complexity Check
      if: always()
      run: |
        pip install lizard
        lizard -l csharp -C 25 -L 100 -a 8 -w --whitelist whitelizard.txt ./mods-dll/thebasics/src/ ./mods-dll/dimensionlib/src/ ./mods-dll/dimensionpockets/src/ ./mods-dll/dimensioncavern/src/
      shell: bash

    - name: Test Build Output
      if: always()
      run: |
        Write-Host "Checking build outputs..." -ForegroundColor Yellow
        
        $dllPaths = @(
          "mods-dll\thebasics\bin\Release\net10.0\thebasics.dll",
          "mods-dll\dimensionlib\bin\Release\net10.0\dimensionlib.dll",
          "mods-dll\dimensionpockets\bin\Release\net10.0\pocketdimensions.dll",
          "mods-dll\dimensioncavern\bin\Release\net10.0\dimensioncavern.dll"
        )

        foreach ($dllPath in $dllPaths) {
          if (Test-Path $dllPath) {
            Write-Host "$dllPath built successfully" -ForegroundColor Green
            $size = (Get-Item $dllPath).Length
            Write-Host "  Size: $($size / 1KB) KB" -ForegroundColor Gray
          } else {
            Write-Host "Expected DLL not found at: $dllPath" -ForegroundColor Red
            exit 1
          }
        }
        
      shell: pwsh
      

    - name: Package Code Mods
      if: success()
      run: |
        Write-Host "Creating distribution packages..." -ForegroundColor Yellow

        $modDirs = @(
          "mods-dll\thebasics",
          "mods-dll\dimensionlib",
          "mods-dll\dimensionpockets",
          "mods-dll\dimensioncavern"
        )

        foreach ($modDir in $modDirs) {
          Push-Location $modDir
          try {
            & ".\scripts\package.ps1"
            Write-Host "$modDir packaged successfully" -ForegroundColor Green
          } catch {
            Write-Host "Error: $modDir packaging failed: $_" -ForegroundColor Red
            exit 1
          } finally {
            Pop-Location
          }
        }
      shell: pwsh
      
    - name: Get Mod Version
      id: mod_version
      run: |
        $modInfo = Get-Content "mods-dll\thebasics\modinfo.json" | ConvertFrom-Json
        $version = $modInfo.version -replace '\.', '_' -replace '-', '_'
        echo "version=$version" >> $env:GITHUB_OUTPUT
        Write-Host "Mod version: $($modInfo.version) (normalized: $version)" -ForegroundColor Green
      shell: pwsh
      
    - name: Upload Main Mod Package
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: thebasics-mod-${{ steps.mod_version.outputs.version }}
        path: mods-dll/thebasics/thebasics_*.zip
        retention-days: 30
        
    - name: Upload All Mod Packages
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mod-packages-${{ steps.mod_version.outputs.version }}
        path: |
          mods-dll/*/*.zip
          mods/*/*.zip
        retention-days: 30 
